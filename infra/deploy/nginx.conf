# ============================================================================
# nginx reverse proxy for the Convention Platform.
# TLS-terminates and forwards everything (HTTP + WebSocket /ws/chat) to the
# Node app on 127.0.0.1:4000. The Node app serves the SPA + injects social meta.
#
# Install:
#   sudo cp infra/deploy/nginx.conf /etc/nginx/sites-available/convention
#   sudo ln -sf /etc/nginx/sites-available/convention /etc/nginx/sites-enabled/convention
#   sudo rm -f /etc/nginx/sites-enabled/default
#   # replace YOUR_DOMAIN below first, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN   # adds the 443 block
# ============================================================================

# Required for WebSocket upgrades (live chat). `map` lives in http context;
# sites-available files are included there, so this is valid here.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name YOUR_DOMAIN www.YOUR_DOMAIN;

  # Allow large image uploads through to the app's own size checks.
  client_max_body_size 12m;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;

    # WebSocket upgrade (Virtual Con live chat at /ws/chat)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Real client IP (the app trusts one proxy hop; powers rate limits + BotBlock)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600s;   # keep long-lived chat sockets open
    proxy_send_timeout 3600s;
  }
}
